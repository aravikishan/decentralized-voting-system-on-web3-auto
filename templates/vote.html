<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Decentralized Voting System</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/register">Register</a>
            <a href="/candidates">Candidates</a>
            <a href="/vote">Vote</a>
            <a href="/results">Results</a>
        </nav>
    </header>
    <main class="container">
        <h1 class="mt-5">Vote</h1>
        <form action="/api/vote" method="post" novalidate>
            <div class="mb-3">
                <label for="vote_id" class="form-label">Vote ID</label>
                <input type="text" class="form-control" id="vote_id" name="vote_id" required>
                <div class="invalid-feedback">Please provide a valid Vote ID.</div>
            </div>
            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" name="user_id" required>
                <div class="invalid-feedback">Please provide your User ID.</div>
            </div>
            <div class="mb-3">
                <label for="candidate_id" class="form-label">Candidate ID</label>
                <input type="text" class="form-control" id="candidate_id" name="candidate_id" required>
                <div class="invalid-feedback">Please provide a Candidate ID.</div>
            </div>
            <button type="submit" class="btn btn-primary">Submit Vote</button>
        </form>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
